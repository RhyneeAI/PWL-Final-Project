<!DOCTYPE html>
<html lang="id" class="h-full dark">   <!-- Ubah jadi h-full -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
</head>
<body class="h-full bg-gray-950 dark:bg-gray-950 flex flex-col">   <!-- h-full + bg yang sesuai -->
    <!-- Container utama flex -->
    <div class="flex flex-1 overflow-hidden">  

        <!-- Sidebar Container -->
        <div id="sidebar-container" class="flex-shrink-0"></div>

        <!-- Main Area -->
        <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
            
            <!-- Header -->
            <div id="header-container"></div>

            <!-- Content -->
            <main id="content-container" class="flex-1 overflow-auto bg-gray-950">
                <div id="content-wrapper" class="p-4 lg:p-8 max-w-7xl mx-auto"></div>
            </main>

            <!-- Footer -->
            <div id="footer-container"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
